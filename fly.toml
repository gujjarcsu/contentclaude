app = "contentclaude"
primary_region = "syd"   # Sydney — matches Neon + Upstash region

[build]

# Sync the database schema before the new release goes live. This project uses
# Prisma's schema-push workflow (no migrations folder), so `db push` is the
# correct, idempotent command — it applies additive changes (new indexes, columns)
# with no data loss and is a no-op when the schema is already current.
[deploy]
  release_command = "npx prisma db push --skip-generate"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"
