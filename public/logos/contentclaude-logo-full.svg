<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-text-main { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 72px; font-weight: 700; fill: #1a1a1a; letter-spacing: -1px; }
      .logo-text-highlight { fill: url(#blueGradient); }
      .logo-tagline { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 18px; fill: #666666; font-weight: 500; letter-spacing: 0.5px; }
    </style>
  </defs>
  <g id="logo-icon">
    <rect x="50" y="60" width="120" height="160" rx="8" fill="url(#blueGradient)" opacity="0.1" stroke="url(#blueGradient)" stroke-width="2"/>
    <path d="M 95 120 Q 85 100 85 140 Q 85 180 95 160" fill="none" stroke="url(#blueGradient)" stroke-width="8" stroke-linecap="round"/>
    <line x1="85" y1="150" x2="155" y2="150" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="85" y1="165" x2="155" y2="165" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="85" y1="180" x2="130" y2="180" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>
  <text x="200" y="145" class="logo-text-main">
    <tspan>Content</tspan><tspan class="logo-text-highlight">Claude</tspan>
  </text>
  <text x="200" y="180" class="logo-tagline">Powered by Claude AI</text>
</svg>
