<svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="es-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAF4FF"/>
      <stop offset="100%" stop-color="#D6EBFF"/>
    </linearGradient>
    <linearGradient id="es-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
    <linearGradient id="es-check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C48C"/>
      <stop offset="100%" stop-color="#00875A"/>
    </linearGradient>
  </defs>
  <circle cx="120" cy="90" r="80" fill="url(#es-bg)" opacity="0.55"/>
  <!-- Magnifying glass -->
  <circle cx="108" cy="82" r="34" fill="none" stroke="#C8E0FF" stroke-width="14" opacity="0.5"/>
  <circle cx="108" cy="82" r="28" fill="white" stroke="#D6EBFF" stroke-width="1.5"/>
  <!-- Lines inside glass -->
  <rect x="94" y="76" width="28" height="4" rx="2" fill="#C8E0FF"/>
  <rect x="94" y="84" width="22" height="4" rx="2" fill="#D6EBFF"/>
  <!-- Handle -->
  <line x1="130" y1="104" x2="148" y2="122" stroke="#C8E0FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="104" x2="148" y2="122" stroke="#D6EBFF" stroke-width="7" stroke-linecap="round"/>
  <!-- All-clear check -->
  <circle cx="108" cy="82" r="16" fill="url(#es-check)" opacity="0.15"/>
  <circle cx="108" cy="82" r="12" fill="url(#es-check)"/>
  <path d="M102 82 L106 86 L114 78" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stars / sparks -->
  <circle cx="158" cy="52" r="4" fill="#0A84FF" opacity="0.25"/>
  <circle cx="168" cy="68" r="2.5" fill="#0A84FF" opacity="0.18"/>
  <circle cx="70" cy="60" r="3" fill="#0A84FF" opacity="0.2"/>
</svg>
