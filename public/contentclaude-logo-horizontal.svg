<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- CC Icon -->
  <circle cx="100" cy="150" r="70" fill="url(#orangeGradient)" filter="url(#shadow)"/>
  <text x="100" y="175" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="75" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-6">CC</text>

  <!-- Text: ContentClaude -->
  <text x="210" y="130" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" fill="#1a1a1a" letter-spacing="-1">
    ContentClaude
  </text>

  <!-- Tagline: Powered by Claude -->
  <text x="210" y="175" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="20" font-weight="500" fill="#666666" letter-spacing="0.5">
    Powered by Claude
  </text>
</svg>
