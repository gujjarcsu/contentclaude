<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- CC Icon (centered at top) -->
  <circle cx="200" cy="120" r="80" fill="url(#orangeGradient)" filter="url(#shadow)"/>
  <text x="200" y="155" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="90" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-7">CC</text>

  <!-- Text below -->
  <text x="200" y="290" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="#1a1a1a" letter-spacing="-1">
    ContentClaude
  </text>

  <!-- Tagline -->
  <text x="200" y="345" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" font-weight="500" text-anchor="middle" fill="#666666">
    Powered by Claude
  </text>
</svg>
