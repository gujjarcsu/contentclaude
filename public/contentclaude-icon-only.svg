<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pure monogram CC - Premium icon -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Circle background with shadow -->
  <circle cx="100" cy="100" r="95" fill="url(#orangeGradient)" filter="url(#shadow)"/>

  <!-- Inner highlight circle for depth -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- CC Text - centered and bold -->
  <text x="100" y="125" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="100" font-weight="800" text-anchor="middle" fill="white" letter-spacing="-8">CC</text>
</svg>
