<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Monogram CC Logo - Premium minimal design -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with subtle shadow effect -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#orangeGradient)" filter="url(#shadow)"/>

  <!-- CC Monogram in white -->
  <text x="100" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-8">CC</text>
</svg>
