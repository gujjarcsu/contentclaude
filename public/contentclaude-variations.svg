<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- LEFT: Light Mode (white background) -->
  <rect x="0" y="0" width="600" height="400" fill="white"/>

  <!-- Icon -->
  <circle cx="80" cy="200" r="50" fill="url(#orangeGradient)" filter="url(#shadow)"/>
  <text x="80" y="222" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="60" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-5">CC</text>

  <!-- Text -->
  <text x="160" y="170" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" fill="#1a1a1a" letter-spacing="-1">
    ContentClaude
  </text>
  <text x="160" y="210" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="500" fill="#666666">
    Powered by Claude
  </text>

  <!-- Label -->
  <text x="300" y="380" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" font-weight="500" fill="#999999">
    Light Mode
  </text>

  <!-- DIVIDER -->
  <line x1="600" y1="0" x2="600" y2="400" stroke="#e0e0e0" stroke-width="1"/>

  <!-- RIGHT: Dark Mode (dark background) -->
  <rect x="600" y="0" width="600" height="400" fill="#1a1a1a"/>

  <!-- Icon -->
  <circle cx="680" cy="200" r="50" fill="url(#orangeGradient)" filter="url(#shadow)"/>
  <text x="680" y="222" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="60" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-5">CC</text>

  <!-- Text -->
  <text x="760" y="170" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">
    ContentClaude
  </text>
  <text x="760" y="210" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="500" fill="#aaaaaa">
    Powered by Claude
  </text>

  <!-- Label -->
  <text x="900" y="380" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" font-weight="500" fill="#666666">
    Dark Mode
  </text>
</svg>
