# ContentClaude — Shopify App Configuration
# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1279a14cca41d4a6f8e6e3c485870b77"
name = "ContentClaude"
application_url = "https://contentclaude.fly.dev"
embedded = true
icon = "public/contentclaude-icon-1200.png"

[access_scopes]
scopes = "write_products,write_content,write_metaobjects,write_metaobject_definitions"

[webhooks]
api_version = "2026-04"

  # App lifecycle
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = ["app/scopes_update"]

  # Billing
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = ["app_subscriptions/update"]

  # Autopilot
  [[webhooks.subscriptions]]
  uri = "/webhooks/products/create"
  topics = ["products/create"]

  # GDPR mandatory compliance webhooks — required for App Store listing
  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request"]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/redact"]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = ["shop/redact"]
  uri = "/webhooks/shop/redact"

[auth]
redirect_urls = ["https://contentclaude.fly.dev/api/auth"]

[build]
automatically_update_urls_on_dev = true
