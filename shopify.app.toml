# ContentPilot AI — Shopify App Configuration
# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1279a14cca41d4a6f8e6e3c485870b77"
name = "ContentPilot AI"
application_url = "https://example.com"
embedded = true

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[webhooks]
api_version = "2026-07"

  # App lifecycle
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = ["app/scopes_update"]

  # Billing — subscription created, upgraded, cancelled, frozen
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = ["app_subscriptions/update"]

  # Autopilot — generate content when a new product is created
  [[webhooks.subscriptions]]
  uri = "/webhooks/products/create"
  topics = ["products/create"]

  # NOTE: GDPR compliance webhooks (customers/data_request, customers/redact,
  # shop/redact) are NOT registered via toml. They must be configured in the
  # Shopify Partner Dashboard → App → App setup → GDPR data requests.
  # Handler files: webhooks.customers.data_request.jsx / .customers.redact.jsx
  # / .shop.redact.jsx — those files ARE in place and ready.

[auth]
redirect_urls = ["https://example.com/api/auth"]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
